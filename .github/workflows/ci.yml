name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Ruby ${{ matrix.ruby }} / activemodel ${{ matrix.activemodel }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.1", "3.2", "3.3", "3.4"]
        activemodel: ["7.0", "7.1", "7.2", "8.0"]
        exclude:
          # activemodel 8.0 requires Ruby 3.2+
          - ruby: "3.1"
            activemodel: "8.0"
    env:
      ACTIVEMODEL_VERSION: ${{ matrix.activemodel }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run specs
        run: bundle exec rspec

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
      - name: Run standard
        run: bundle exec standardrb
